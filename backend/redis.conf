# Redis 持久化配置（秒杀系统）
# RDB + AOF 双开，兼顾恢复速度和数据安全

# ========== RDB 快照 ==========
# 60 秒内至少 1 个 key 变化就存快照（秒杀期间库存一直在变，几乎实时）
save 60 1
# 如果 60 秒内写了 10000 个 key，也触发保存
save 60 10000
# 默认也保留（低频率兜底）
save 300 10
save 900 1
# 快照文件名
dbfilename dump.rdb
# 快照目录（容器内 /data，已挂载到宿主机 Volume）
dir /data

# ========== AOF 追加日志 ==========
# 开启 AOF，每条写命令都记录，数据安全性最高
appendonly yes
# 每秒 fsync 一次——性能和安全的最佳平衡点
appendfsync everysec
# AOF 文件自动重写（压缩历史命令，防止文件无限增长）
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
